/* ============================================
   NJU AI FORUM ‚ÄĒ CRT Green Phosphor Splash
   Style: retro-ascii-skills Mode 02
   ============================================ */

@import url('https://fonts.googleapis.com/css2?family=VT323&family=Share+Tech+Mono&display=swap');

/* --- CSS Variables / Design Tokens --- */
:root {
  --crt-green: #00ff41;
  --crt-green-dim: #00cc33;
  --crt-green-dark: #00991a;
  --crt-green-glow: #00ff4180;
  --crt-amber: #ffb000;
  --crt-amber-dim: #cc8d00;
  --crt-bg: #0a0a0a;
  --crt-bg-inner: #050505;
  --crt-scanline: rgba(0, 255, 65, 0.03);
  --font-mono: 'VT323', 'Share Tech Mono', 'Courier New', monospace;
  --font-size-base: 16px;
  --glow-sm: 0 0 4px var(--crt-green-glow);
  --glow-md: 0 0 8px var(--crt-green-glow), 0 0 16px rgba(0,255,65,0.3);
  --glow-lg: 0 0 10px var(--crt-green-glow), 0 0 20px rgba(0,255,65,0.4), 0 0 40px rgba(0,255,65,0.2);
  --glow-amber: 0 0 8px rgba(255,176,0,0.5), 0 0 16px rgba(255,176,0,0.3);
}

/* --- Reset & Base --- */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: var(--crt-bg);
  color: var(--crt-green);
  font-family: var(--font-mono);
  font-size: var(--font-size-base);
  line-height: 1.4;
}

/* --- CRT Monitor Shell --- */
.crt-monitor {
  position: fixed; inset: 0;
  display: flex; align-items: center; justify-content: center;
  background: #111;
  z-index: 10000;
  transition: opacity 0.8s ease;
}
.crt-monitor.off { opacity: 0; pointer-events: none; }

.crt-bezel {
  width: 96vw; height: 94vh;
  max-width: 1600px;
  background: #1a1a1a;
  border-radius: 24px;
  padding: 18px;
  box-shadow: 0 0 60px rgba(0,0,0,0.8), inset 0 2px 4px rgba(255,255,255,0.05);
  position: relative;
}

.crt-bezel::before {
  content: 'NJU-AI // CRT-2000';
  position: absolute;
  bottom: 4px; left: 50%;
  transform: translateX(-50%);
  font-size: 10px;
  color: #333;
  letter-spacing: 2px;
}

.crt-bezel::after {
  content: '';
  position: absolute;
  bottom: 8px; right: 24px;
  width: 8px; height: 8px;
  border-radius: 50%;
  background: #00ff41;
  box-shadow: 0 0 6px #00ff41;
  animation: power-led 2s ease-in-out infinite;
}

@keyframes power-led {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

/* --- CRT Screen (the content area) --- */
.crt-screen {
  width: 100%; height: 100%;
  background: var(--crt-bg-inner);
  border-radius: 12px;
  overflow: hidden;
  position: relative;
  box-shadow: inset 0 0 80px rgba(0,255,65,0.02);
}

/* Scanline overlay */
.crt-screen::before {
  content: '';
  position: absolute; inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 1px,
    var(--crt-scanline) 1px,
    var(--crt-scanline) 2px
  );
  z-index: 100;
  pointer-events: none;
  animation: scanlines 0.1s steps(30) infinite;
}

/* CRT flicker */
.crt-screen::after {
  content: '';
  position: absolute; inset: 0;
  background: rgba(0,255,65,0.015);
  z-index: 99;
  pointer-events: none;
  animation: flicker 4s ease-in-out infinite;
}

@keyframes scanlines {
  0% { transform: translateY(0); }
  100% { transform: translateY(2px); }
}

@keyframes flicker {
  0%, 100% { opacity: 0; }
  50% { opacity: 1; }
  52% { opacity: 0; }
  54% { opacity: 1; }
}

/* CRT vignette */
.crt-vignette {
  position: absolute; inset: 0;
  background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.6) 100%);
  z-index: 98;
  pointer-events: none;
}

/* --- Matrix Rain Background --- */
#matrix-canvas {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  opacity: 0.12;
  z-index: 1;
}

/* --- Main Content --- */
.terminal-content {
  position: relative;
  z-index: 10;
  width: 100%; height: 100%;
  padding: 24px 32px;
  overflow-y: auto;
  scrollbar-width: none;
}
.terminal-content::-webkit-scrollbar { display: none; }

/* --- Boot Sequence --- */
.boot-line {
  opacity: 0;
  white-space: pre;
  text-shadow: var(--glow-sm);
}
.boot-line.visible {
  opacity: 1;
  animation: typeIn 0.05s steps(1) forwards;
}

@keyframes typeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

/* --- ASCII Art Banner --- */
.ascii-banner {
  color: var(--crt-green);
  text-shadow: var(--glow-lg);
  font-size: 11px;
  line-height: 1.15;
  letter-spacing: 0;
  margin: 12px 0;
  white-space: pre;
  opacity: 0;
  transition: opacity 0.6s ease;
}
.ascii-banner.visible {
  opacity: 1;
}

.ascii-banner-amber {
  color: var(--crt-amber);
  text-shadow: var(--glow-amber);
}

/* --- Subtitle / Info --- */
.subtitle {
  color: var(--crt-green-dim);
  text-shadow: var(--glow-sm);
  margin-top: 8px;
  font-size: 18px;
  letter-spacing: 6px;
  text-align: center;
  opacity: 0;
  transition: opacity 0.5s ease;
}
.subtitle.visible { opacity: 1; }

.info-line {
  color: var(--crt-green-dark);
  font-size: 14px;
  margin-top: 4px;
  text-shadow: var(--glow-sm);
  opacity: 0;
  transition: opacity 0.3s ease;
}
.info-line.visible { opacity: 1; }

/* --- Separator --- */
.separator {
  color: var(--crt-green-dark);
  text-shadow: var(--glow-sm);
  opacity: 0;
  transition: opacity 0.3s ease;
  margin: 6px 0;
}
.separator.visible { opacity: 1; }

/* --- Menu --- */
.menu-block {
  margin-top: 8px;
  opacity: 0;
  transition: opacity 0.5s ease;
}
.menu-block.visible { opacity: 1; }

.menu-item {
  color: var(--crt-green);
  text-shadow: var(--glow-sm);
  padding: 2px 0;
  cursor: pointer;
  transition: all 0.15s ease;
  display: inline-block;
}
.menu-item:hover {
  color: var(--crt-amber);
  text-shadow: var(--glow-amber);
  transform: translateX(4px);
}

/* --- Prompt / Cursor --- */
.prompt-line {
  margin-top: 10px;
  color: var(--crt-green);
  text-shadow: var(--glow-sm);
  opacity: 0;
  transition: opacity 0.3s ease;
}
.prompt-line.visible { opacity: 1; }

.cursor {
  display: inline-block;
  width: 10px; height: 18px;
  background: var(--crt-green);
  box-shadow: var(--glow-sm);
  animation: blink 1s steps(1) infinite;
  vertical-align: text-bottom;
  margin-left: 2px;
}

@keyframes blink {
  0%, 50% { opacity: 1; }
  51%, 100% { opacity: 0; }
}

/* --- Glitch Effect --- */
.glitch {
  position: relative;
}
.glitch.active {
  animation: glitch-anim 0.3s steps(2) forwards;
}
@keyframes glitch-anim {
  0% { transform: translate(0); text-shadow: var(--glow-lg); }
  20% { transform: translate(-3px, 2px); text-shadow: 3px 0 #ff0040, -3px 0 #00ff41; }
  40% { transform: translate(3px, -1px); text-shadow: -3px 0 #ff0040, 3px 0 #00ff41; }
  60% { transform: translate(-2px, 1px); text-shadow: 2px 0 #ff0040, -2px 0 #00ff41; }
  80% { transform: translate(2px, -2px); text-shadow: -2px 0 #ff0040, 2px 0 #00ff41; }
  100% { transform: translate(0); text-shadow: var(--glow-lg); }
}

/* --- Status Bar --- */
.status-bar {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  padding: 6px 16px;
  background: rgba(0,255,65,0.05);

  margin-right: 6px;

/* --- Responsive --- */
@media (max-width: 768px) {

  .subtitle { font-size: 12px; letter-spacing: 3px; }
  .terminal-content { padding: 12px 10px; }

@media (max-width: 480px) {

.loading-bar-container {

  opacity: 0;

.loading-bar-track {

  padding: 2px;

.loading-bar-fill {

  box-shadow: var(--glow-md);
  width: 0%;

.loading-bar-text {

  font-size: 12px;
  margin-top: 2px;
  text-shadow: var(--glow-sm);

/* --- Horizontal Rule ASCII --- */
.hr-ascii {

/* --- System Info Grid --- */
.sysinfo-grid {

}
.sysinfo-grid .value {
  color: var(--crt-green);
  text-shadow: var(--glow-sm);
}
</style>

}

function createEl(tag, cls, html) {
  const el = document.createElement(tag);
  if (cls) el.className = cls;
  if (html !== undefined) el.innerHTML = html;
  terminal.appendChild(el);
  return el;
}

// Notification toast
function showNotification(text) {
  const existing = document.querySelector('.notification');
  if (existing) existing.remove();

  const notif = document.createElement('div');
  notif.className = 'notification';
  notif.style.cssText = `

    color: var(--crt-green); text-shadow: var(--glow-sm);
    font-family: var(--font-mono); font-size: 16px;
    padding: 16px 32px; z-index: 9999;
    box-shadow: var(--glow-md);
    animation: fadeInOut 2s ease forwards;
  `;
  notif.textContent = text;
  document.body.appendChild(notif);

  setTimeout(() => notif.remove(), 2000);
}
